services:
  # Next.js Application
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
      args:
        DATABASE_URL: postgresql://gatectr:secret@postgres:5432/gatectr_dev
    container_name: gatectr_app
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgresql://gatectr:secret@postgres:5432/gatectr_dev
      REDIS_URL: redis://redis:6379
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gatectr_net

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: gatectr_postgres
    environment:
      POSTGRES_USER: gatectr
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: gatectr_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gatectr"]
      interval: 10s
      retries: 5
    networks:
      - gatectr_net

  # Redis Cache & Queue
  redis:
    image: redis:7-alpine
    container_name: gatectr_redis
    command: redis-server --appendonly yes --maxmemory 512mb
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5
    networks:
      - gatectr_net

  # Background Worker (BullMQ)
  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
      args:
        DATABASE_URL: postgresql://gatectr:secret@postgres:5432/gatectr_dev
    container_name: gatectr_worker
    command: npx tsx workers/webhook.worker.ts
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgresql://gatectr:secret@postgres:5432/gatectr_dev
      REDIS_URL: redis://redis:6379
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - redis
      - postgres
    networks:
      - gatectr_net

  # Stripe CLI for webhook testing
  stripe_cli:
    image: stripe/stripe-cli:latest
    container_name: gatectr_stripe_cli
    command: listen --forward-to app:3000/api/webhooks/stripe
    environment:
      STRIPE_API_KEY: "${STRIPE_SECRET_KEY}"
    networks:
      - gatectr_net
    profiles:
      - tools

  # pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4
    container_name: gatectr_pgadmin
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@gatectr.io
      PGADMIN_DEFAULT_PASSWORD: admin123
    networks:
      - gatectr_net
    profiles:
      - tools

volumes:
  postgres_data:
  redis_data:

networks:
  gatectr_net:
    driver: bridge
