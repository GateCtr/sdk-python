name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  ci:
    name: CI before publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Hatch
        run: pip install hatch

      - name: Lint
        run: hatch run lint

      - name: Type check
        run: hatch run typecheck

      - name: Test
        run: hatch run test-cov

  publish:
    name: Publish to PyPI
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Hatch
        run: pip install hatch

      - name: Build
        run: hatch build

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
