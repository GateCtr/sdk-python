name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install "virtualenv>=20.26" "hatch>=1.12"
          pip install -e .
          pip install pytest pytest-asyncio pytest-cov respx hypothesis mypy ruff httpx pydantic

      - name: Lint
        run: ruff check gatectr/ tests/

      - name: Type check
        run: mypy gatectr/

      - name: Test with coverage
        run: pytest --cov=gatectr --cov-report=term-missing --cov-fail-under=80

      - name: Build
        run: hatch build
