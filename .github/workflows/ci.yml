name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '24'
  PNPM_VERSION: '10'
  # Prevents prisma generate from running during pnpm install (postinstall)
  # prisma generate is called explicitly in each job that needs it
  PRISMA_SKIP_GENERATE: 'true'
  # Dummy DATABASE_URL for prisma generate (no real connection needed)
  DATABASE_URL: 'postgresql://ci:ci@localhost:5432/ci'

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint

      - name: Check formatting
        run: pnpm exec prettier --check "**/*.{ts,tsx,js,jsx,json,css,md}"

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm prisma generate

      - name: Run TypeScript compiler
        run: pnpm exec tsc --noEmit

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm prisma generate

      - name: Run unit tests
        run: pnpm test -- --coverage

      - name: Upload coverage reports
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/coverage-final.json
          flags: unittests
          name: codecov-umbrella

  build:
    name: Build Application
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm prisma generate

      - name: Build application
        run: pnpm build
        env:
          SKIP_ENV_VALIDATION: true
          RESEND_API_KEY: 're_dummy_ci_key'

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: .next
          retention-days: 1

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    # E2E tests require Clerk secrets — skip until configured
    if: |
      github.event_name == 'push' &&
      vars.E2E_ENABLED == 'true'
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: gatectr
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: gatectr_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm prisma generate
        env:
          DATABASE_URL: postgresql://gatectr:secret@localhost:5432/gatectr_test

      - name: Run database migrations
        run: pnpm prisma migrate deploy
        env:
          DATABASE_URL: postgresql://gatectr:secret@localhost:5432/gatectr_test

      - name: Build application
        run: pnpm build
        env:
          SKIP_ENV_VALIDATION: true
          RESEND_API_KEY: 're_dummy_ci_key'
          DATABASE_URL: postgresql://gatectr:secret@localhost:5432/gatectr_test

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      - name: Run E2E tests
        run: pnpm test:e2e --pass-with-no-tests
        env:
          DATABASE_URL: postgresql://gatectr:secret@localhost:5432/gatectr_test
          REDIS_URL: redis://localhost:6379
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.run_attempt }}
          path: playwright-report/
          retention-days: 7

  prisma-validate:
    name: Validate Prisma Schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Prisma schema
        run: pnpm prisma validate

  migrate:
    name: Run Migrations
    runs-on: ubuntu-latest
    continue-on-error: true
    # Only run on direct pushes to main/develop — not on PRs (handled by neon-branch.yml)
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm prisma generate

      - name: Run migrations and seed on Neon branch
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            DB_URL="${{ secrets.NEON_DATABASE_URL_MAIN }}"
            DIRECT_URL="${{ secrets.NEON_DIRECT_URL_MAIN }}"
          else
            DB_URL="${{ secrets.NEON_DATABASE_URL_DEVELOP }}"
            DIRECT_URL="${{ secrets.NEON_DIRECT_URL_DEVELOP }}"
          fi
          if [ -z "$DB_URL" ]; then
            echo "⚠️  No DATABASE_URL secret configured for this branch — skipping migrations."
            exit 0
          fi
          # Use direct URL for migrate (required by Prisma — pooler not supported)
          # Fall back to pooler URL if no direct URL configured
          MIGRATE_URL="${DIRECT_URL:-$DB_URL}"
          DATABASE_URL="$MIGRATE_URL" DIRECT_URL="$MIGRATE_URL" pnpm prisma migrate deploy
          DATABASE_URL="$DB_URL" pnpm prisma db seed
